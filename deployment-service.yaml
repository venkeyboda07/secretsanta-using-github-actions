apiVersion: apps/v1
kind: Deployment      # Kubernetes resource kind we are creating
metadata:
  name: santa-deployment
spec:
  selector:
    matchLabels:
      app: santa
  replicas: 4         # Number of replicas that will be created for this deployment
  template:
    metadata:
      labels:
        app: santa
    spec:
      containers:
        - name: santa
          image: venkeyboda/secret-santa:latest  # Image that will be used to containers in the cluster
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080   # The port that the container is running on in the cluster

          resources:
            requests:
              cpu: "250m"        # Minimum CPU guaranteed to the container (0.25 core)
              memory: "256Mi"    # Minimum memory guaranteed (256 MiB)
            limits:
              cpu: "500m"        # Maximum CPU the container can use (0.5 core, throttled if exceeded)
              memory: "512Mi"    # Maximum memory allowed (512 MiB, container will be OOMKilled if exceeded)

---

apiVersion: v1    # Kubernetes API version
kind: Service     # Kubernetes resource kind we are creating
metadata:         # Metadata of the resource kind we are creating
  name: santa-ssvc
spec:
  selector:
    app: santa
  ports:
    - protocol: "TCP"
      port: 8080        # The port that the service is running on in the cluster
      targetPort: 8080  # The port exposed by the service
  type: LoadBalancer    # type of the service.
