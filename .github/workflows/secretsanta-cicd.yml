name: Maven Package && Docker Image Build and Push

on:
    push:
      branches:
        - main

jobs:

    changes:
      runs-on: ubuntu-latest
      outputs:
          run_ci: ${{ steps.filter.outputs.ci }}
        
      steps:
          - name: Checkout
            uses: actions/checkout@v4
      
          - name: Filter changes
            id: filter
            uses: dorny/paths-filter@v3
            with:
              filters: |
                ci:
                  - 'src/**'

    maven-build:
        needs: changes
        if: needs.changes.outputs.run_ci == 'true'
        runs-on: ubuntu-latest
        permissions:
          contents: read
          packages: write

        steps:
          - uses: actions/checkout@v3
          - name: Set up JDK 11
            uses: actions/setup-java@v3
            with:
              java-version: '11'
              distribution: 'temurin'
              server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
              settings-path: ${{ github.workspace }} # location for the settings.xml file

          - name: Build with Maven
            run: mvn -B package --file pom.xml


    Image-build-push-scan:
        runs-on: ubuntu-latest
        needs: [changes,maven-build]
        if: always()

        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

        steps:
          - name: Checkout source code
            uses: actions/checkout@v4

          - name: Login to DockerHub
            run: echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

          - name: Build and Push Docker Image
            run: |
              docker build -t secret-santa .
              docker tag secret-santa:latest $DOCKER_USERNAME/secret-santa:latest
              docker push $DOCKER_USERNAME/secret-santa:latest

          - name: Install Trivy
            run: |
              wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.69.3_Linux-64bit.deb
              sudo dpkg -i trivy_0.69.3_Linux-64bit.deb

          - name: Trivy scan
            run: trivy image -f table -o trivy-report.txt $DOCKER_USERNAME/secret-santa:latest
                
          - name: Upload report
            uses: actions/upload-artifact@v4
            with:
              name: trivy-report
              path: trivy-report.txt
            