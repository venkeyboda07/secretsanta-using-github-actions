name: Maven Package && Docker Image Build and Push

on:
    push:
      branches:
        - main

jobs:

    changes:
      runs-on: ubuntu-latest
      outputs:
          run_ci: ${{ steps.filter.outputs.ci }}
        
      steps:
          - name: Checkout
            uses: actions/checkout@v4
      
          - name: Filter changes
            id: filter
            uses: dorny/paths-filter@v3
            with:
              filters: |
                ci:
                  - 'src/**'

    maven-build:
      needs: changes
      if: needs.changes.outputs.run_ci == 'true'
      runs-on: ubuntu-latest
      permissions:
        contents: read
        packages: write

      steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
          settings-path: ${{ github.workspace }} # location for the settings.xml file

      - name: Build with Maven
        run: mvn -B package --file pom.xml


    Image-build-push:
        runs-on: ubuntu-latest
        needs: [changes,maven-build]
        if: always()

        steps:
          - name: Login to Docker Hub
            uses: docker/login-action@v3
            with:
              username: ${{ secrets.DOCKER_USERNAME }}
              password: ${{ secrets.DOCKER_PASSWORD }}

          - name: Build and Push Docker Image
            run: |
              docker build -t secret-santa .
              docker tag secret-santa:latest venkeyboda/secret-santa:latest
              docker push venkeyboda/secret-santa:latest
            